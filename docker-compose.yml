services:
  postgres:
    image: postgres:16
    container_name: collection-analyzer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: collection_analyzer_development
    ports:
      - "5432:5432"
    volumes:
      - collection_analyzer_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d collection_analyzer_development"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  collection_analyzer_postgres_data:
