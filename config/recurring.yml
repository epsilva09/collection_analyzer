production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  collect_tracked_characters_snapshots_09h:
    class: CollectTrackedCharactersSnapshotsJob
    queue: default
    schedule: at 9:00 every day

  collect_tracked_characters_snapshots_14h:
    class: CollectTrackedCharactersSnapshotsJob
    queue: default
    schedule: at 14:00 every day

  collect_tracked_characters_snapshots_21h:
    class: CollectTrackedCharactersSnapshotsJob
    queue: default
    schedule: at 21:00 every day

development:
  collect_tracked_characters_snapshots_09h:
    class: CollectTrackedCharactersSnapshotsJob
    queue: default
    schedule: at 9:00 every day

  collect_tracked_characters_snapshots_14h:
    class: CollectTrackedCharactersSnapshotsJob
    queue: default
    schedule: at 14:00 every day

  collect_tracked_characters_snapshots_21h:
    class: CollectTrackedCharactersSnapshotsJob
    queue: default
    schedule: at 21:00 every day
