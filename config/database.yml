# PostgreSQL. Ensure a local server is running and the `pg` gem is installed.
#
# Optionally override connection settings with:
# DB_HOST, DB_PORT, DB_USERNAME, DB_PASSWORD
#
# For production-like deployments, prefer DATABASE_URL and optional
# CACHE_DATABASE_URL / QUEUE_DATABASE_URL / CABLE_DATABASE_URL.
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST", "127.0.0.1") %>
  port: <%= ENV.fetch("DB_PORT", 5432) %>
  username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "postgres") %>

development:
  <<: *default
  database: collection_analyzer_development

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: collection_analyzer_test

production:
  primary:
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
    database: <%= ENV.fetch("DB_PRIMARY_DATABASE", "collection_analyzer_production") %>
  cache:
    <<: *default
    url: <%= ENV["CACHE_DATABASE_URL"] || ENV["DATABASE_URL"] %>
    database: <%= ENV.fetch("DB_CACHE_DATABASE", "collection_analyzer_production_cache") %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    url: <%= ENV["QUEUE_DATABASE_URL"] || ENV["DATABASE_URL"] %>
    database: <%= ENV.fetch("DB_QUEUE_DATABASE", "collection_analyzer_production_queue") %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    url: <%= ENV["CABLE_DATABASE_URL"] || ENV["DATABASE_URL"] %>
    database: <%= ENV.fetch("DB_CABLE_DATABASE", "collection_analyzer_production_cable") %>
    migrations_paths: db/cable_migrate
